<div class="container">
  <div class="section-header">
    <h2>Our Services</h2>
    <p>Everything we offer to make your stay smooth and memorable.</p>
  </div>

  <div class="services-grid">
    {% for service in services %}
    <div class="service-card">
      <div class="service-icon">
        <i class="{{ service.icon_class }}"></i>
      </div>
      <h3>{{ service.title }}</h3>
      <p>{{ service.description }}</p>
    </div>
    {% empty %}
    <div class="service-card">
      <div class="service-icon"><i class="fas fa-concierge-bell"></i></div>
      <h3>Service setup pending</h3>
      <p>Add your services in the admin portal under Service Items.</p>
    </div>
    {% endfor %}
  </div>
</div>

<style>
  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }

  .service-card {
    padding: 24px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(0, 0, 0, 0.08);
  }

  .service-icon {
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--primary-color, #e76f51);
  }

  .service-card h3 {
    margin-bottom: 8px;
  }

  .service-card p {
    margin: 0;
  }
</style>
